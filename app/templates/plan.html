{% extends "base_v3.html" %}

{% block title %}智能规划 - 灵动旅心 V3{% endblock %}

{% block extra_css %}
<style>
.agent-detail-header { cursor: pointer; }
.agent-chevron { transition: transform 0.2s; color: var(--text-muted); }
.agent-chevron.expanded { transform: rotate(180deg); }
.agent-summary { font-size: 0.8rem; color: var(--text-secondary); margin-top: 8px; line-height: 1.6; }
.agent-embedded-page { display: none; margin-top: 16px; padding-top: 16px; border-top: 1px dashed var(--border); }
.agent-embedded-title { font-weight: 600; font-size: 0.85rem; margin-bottom: 12px; color: var(--text); }
.trace-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 10px; margin-bottom: 16px; }
.trace-item { background: var(--bg-soft); padding: 10px 12px; border-radius: var(--radius-xs); font-size: 0.8rem; }
.trace-item .trace-value { font-weight: 600; font-size: 1rem; color: var(--text); }
.trace-item .trace-label { color: var(--text-muted); font-size: 0.7rem; margin-top: 2px; }
.poi-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
.poi-table th, .poi-table td { text-align: left; padding: 8px; border-bottom: 1px solid var(--border-light); }
.poi-table th { color: var(--text-muted); font-weight: 500; }
.source-tag { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 0.7rem; }
.source-local { background: var(--success-soft); color: var(--success); }
.source-map { background: var(--info-soft); color: var(--info); }
.agent-list-item { padding: 10px 0; border-bottom: 1px solid var(--border-light); }
.agent-list-item:last-child { border-bottom: none; }
.agent-list-item:first-child { padding-top: 0; }

/* Planner 思考链时间轴 */
.planning-trace-card { margin-bottom: 24px; }
.trace-timeline { display: flex; flex-direction: column; gap: 14px; }
.trace-step { display: flex; gap: 12px; align-items: flex-start; }
.trace-step-icon { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: var(--bg-soft); font-size: 0.9rem; flex-shrink: 0; }
.trace-step-body { flex: 1; }
.trace-step-title { font-weight: 600; font-size: 0.85rem; color: var(--text); }
.trace-step-content { font-size: 0.8rem; color: var(--text-secondary); margin-top: 4px; line-height: 1.6; white-space: pre-wrap; }
.trace-step.tool_call .trace-step-icon { background: var(--accent-soft); }
.trace-step.observation .trace-step-icon { background: var(--info-soft); }
.trace-step.thought .trace-step-icon { background: var(--success-soft); }
</style>
{% endblock %}

{% block content %}
<div class="plan-header animate-fade-up">
    <div class="heading-lg">智能旅行规划</div>
    <p>输入目的地与偏好，PlannerAgent 将协调多子Agent为您生成专属行程</p>
</div>

<!-- 规划表单 -->
<div class="card form-card plan-form animate-fade-up animate-delay-1" id="formCard">
    <div class="card-title">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="10" r="3"/>
            <path d="M12 21.7C17.3 17 20 13 20 10a8 8 0 1 0-16 0c0 3 2.7 7 8 11.7z"/>
        </svg>
        旅行信息
    </div>

    <form id="planForm" onsubmit="return startPlan(event)">
        <div class="form-row">
            <div class="form-group">
                <label>目的地城市 *</label>
                <input type="text" id="destination" placeholder="如：杭州、成都、西安" required list="cityList" autocomplete="off">
                <datalist id="cityList">
                    <option value="北京"></option><option value="上海"></option><option value="广州"></option><option value="深圳"></option>
                    <option value="杭州"></option><option value="成都"></option><option value="西安"></option><option value="重庆"></option>
                    <option value="武汉"></option><option value="南京"></option><option value="苏州"></option><option value="厦门"></option>
                    <option value="桂林"></option><option value="丽江"></option><option value="大理"></option>
                </datalist>
            </div>
            <div class="form-group">
                <label>出发城市</label>
                <input type="text" id="origin" value="上海" placeholder="出发城市">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>行程天数</label>
                <select id="days">
                    <option value="2">2天</option>
                    <option value="3" selected>3天</option>
                    <option value="4">4天</option>
                    <option value="5">5天</option>
                    <option value="7">7天</option>
                </select>
            </div>
            <div class="form-group">
                <label>出行人数</label>
                <select id="travelers">
                    <option value="1">1人</option>
                    <option value="2" selected>2人</option>
                    <option value="3">3人</option>
                    <option value="4">4人</option>
                    <option value="5">5人及以上</option>
                </select>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>预算（元/人，可选）</label>
                <input type="number" id="budget" placeholder="如：3000" min="500" step="500">
            </div>
            <div class="form-group">
                <label>旅行风格</label>
                <select id="style">
                    <option value="balanced" selected>均衡节奏</option>
                    <option value="slow">慢节奏 / 度假</option>
                    <option value="intensive">高效 / 特种兵</option>
                    <option value="family">家庭亲子</option>
                    <option value="foodie">美食探索</option>
                    <option value="photography">摄影采风</option>
                </select>
            </div>
        </div>

        <button type="submit" class="btn btn-primary btn-lg" style="width:100%;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="5 3 19 12 5 21 5 3"/>
            </svg>
            开始规划
        </button>
    </form>
</div>

<!-- 加载状态 -->
<div id="loadingSection" style="display:none;">
    <div class="card animate-fade-up" style="text-align:center;padding:56px;">
        <div class="loading">
            <div class="spinner"></div>
            <span style="font-size:1.05rem;">PlannerAgent 正在协调子Agent为您规划行程...</span>
        </div>
        <div id="agentStatus" class="agent-status-list">
            <!-- 动态显示Agent执行状态 -->
        </div>
        <div id="planningTrace" class="trace-timeline" style="margin-top:24px;text-align:left;">
            <!-- 动态显示Planner思考链 -->
        </div>
    </div>
</div>

<!-- 结果展示 -->
<div id="resultSection" style="display:none;"></div>

<script>
const iconCheck = `<svg class="agent-status-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
const iconLoader = `<svg class="agent-status-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="animation:spin 1s linear infinite"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>`;
const iconWait = `<svg class="agent-status-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`;

</script>
<script src="/static/js/result_renderer.js"></script>
<script>

const agentNames = {
    weather: '天气查询Agent',
    hotel: '酒店推荐Agent',
    restaurant: '餐饮推荐Agent',
    attraction: '景点推荐Agent',
    transport: '交通规划Agent',
    risk: '风控Agent'
};
const agentOrder = ['weather', 'hotel', 'restaurant', 'attraction', 'transport', 'risk'];

function generateUUID() {
    return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
        const r = Math.random() * 16 | 0;
        return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
    });
}

function setActiveRunId(runId) {
    try { localStorage.setItem('active_plan_run_id', String(runId)); } catch (e) {}
}

function getActiveRunId() {
    try { return localStorage.getItem('active_plan_run_id'); } catch (e) { return null; }
}

function clearActiveRunId() {
    try { localStorage.removeItem('active_plan_run_id'); } catch (e) {}
}

async function startPlan(e) {
    e.preventDefault();
    const data = {
        destination: document.getElementById('destination').value.trim(),
        origin: document.getElementById('origin').value.trim(),
        days: parseInt(document.getElementById('days').value),
        travelers: parseInt(document.getElementById('travelers').value),
        budget: document.getElementById('budget').value ? parseInt(document.getElementById('budget').value) : null,
        style: document.getElementById('style').value,
    };

    document.getElementById('formCard').style.display = 'none';
    document.getElementById('loadingSection').style.display = 'block';
    document.getElementById('resultSection').style.display = 'none';

    const statusDiv = document.getElementById('agentStatus');
    statusDiv.innerHTML = agentOrder.map(key =>
        `<div id="agent-${key}" class="agent-status-item">${iconWait}${agentNames[key]} - 等待执行...</div>`
    ).join('');
    document.getElementById('planningTrace').innerHTML = '';

    const idempotencyKey = generateUUID();
    subscribeStream(null, data, idempotencyKey);
    return false;
}

function subscribeStream(runId, payload, idempotencyKey) {
    const url = runId
        ? `/api/v3/plan/stream?run_id=${runId}`
        : `/api/v3/plan/stream?idempotency_key=${idempotencyKey}`;

    fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
    }).then(response => {
        if (!response.ok || !response.body) {
            throw new Error(`HTTP ${response.status}`);
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        function read() {
            reader.read().then(({ value, done }) => {
                if (done) {
                    // 正常结束，清理 active run
                    clearActiveRunId();
                    return;
                }
                buffer += decoder.decode(value, { stream: true });
                const chunks = buffer.split('\n\n');
                buffer = chunks.pop();
                for (const chunk of chunks) {
                    if (!chunk.startsWith('data: ')) continue;
                    const payload = chunk.slice(6);
                    if (payload === '[DONE]') {
                        clearActiveRunId();
                        continue;
                    }
                    try {
                        const event = JSON.parse(payload);
                        handleStreamEvent(event, payload);
                    } catch (err) {
                        console.error('解析 SSE 事件失败:', err);
                    }
                }
                read();
            }).catch(err => {
                console.error('SSE 读取失败:', err);
                // 非完成状态下断开，尝试用 run_id 重连
                const activeRunId = getActiveRunId();
                if (activeRunId) {
                    showToast('连接中断，正在重连...', 'warning');
                    setTimeout(() => subscribeStream(activeRunId, payload, null), 1500);
                } else {
                    showToast('请求失败: ' + err.message, 'error');
                    document.getElementById('formCard').style.display = 'block';
                    document.getElementById('loadingSection').style.display = 'none';
                }
            });
        }
        read();
    }).catch(e => {
        showToast('请求失败: ' + e.message, 'error');
        document.getElementById('formCard').style.display = 'block';
        document.getElementById('loadingSection').style.display = 'none';
    });
}

function appendTraceStep(step) {
    const container = document.getElementById('planningTrace');
    if (!container) return;
    const type = step.type || 'thought';
    const icon = type === 'thought' ? '💡' : type === 'tool_call' ? '🔧' : '📥';
    const title = type === 'thought'
        ? '思考'
        : type === 'tool_call'
            ? `调用 ${step.tool || ''}`
            : `观察 ${step.tool || ''}`;
    let content = step.content || '';
    if (!content && step.tool_input && Object.keys(step.tool_input).length) {
        content = '参数：' + JSON.stringify(step.tool_input);
    }
    if (!content && step.result) {
        content = JSON.stringify(step.result);
    }
    const html = `
        <div class="trace-step ${type}">
            <div class="trace-step-icon">${icon}</div>
            <div class="trace-step-body">
                <div class="trace-step-title">${escapeHtml(title)}</div>
                <div class="trace-step-content">${escapeHtml(content)}</div>
            </div>
        </div>`;
    container.insertAdjacentHTML('beforeend', html);
}

function handleStreamEvent(event, rawPayload) {
    if (event.type === 'start' && event.run_id) {
        setActiveRunId(event.run_id);
    } else if (event.type === 'agent_start') {
        const el = document.getElementById(`agent-${event.agent}`);
        if (el) {
            el.className = 'agent-status-item running';
            el.innerHTML = `${iconLoader}${agentNames[event.agent]} - 执行中...`;
        }
    } else if (event.type === 'agent_complete') {
        const el = document.getElementById(`agent-${event.agent}`);
        if (el) {
            el.className = 'agent-status-item done';
            el.innerHTML = `${iconCheck}${agentNames[event.agent]} - 完成 (${event.duration_ms}ms)`;
        }
    } else if (event.type === 'planner_thought') {
        appendTraceStep({type: 'thought', content: event.thought});
    } else if (event.type === 'planner_tool_call') {
        appendTraceStep({type: 'tool_call', tool: event.tool});
        const agentEl = document.getElementById(`agent-${event.tool}`);
        if (agentEl) {
            agentEl.className = 'agent-status-item running';
            agentEl.innerHTML = `${iconLoader}${agentNames[event.tool] || event.tool} - 执行中...`;
        }
    } else if (event.type === 'planner_observation') {
        appendTraceStep({type: 'observation', tool: event.tool, result: event.result});
        const agentName = event.agent || event.tool;
        const el = document.getElementById(`agent-${agentName}`);
        if (el && event.result) {
            el.className = 'agent-status-item done';
            el.innerHTML = `${iconCheck}${agentNames[agentName] || agentName} - 完成 (${event.result.duration_ms || 0}ms)`;
        }
    } else if (event.type === 'itinerary_generating') {
        const statusDiv = document.getElementById('agentStatus');
        statusDiv.innerHTML += `<div class="agent-status-item running">${iconLoader}正在生成结构化行程...</div>`;
    } else if (event.type === 'complete') {
        clearActiveRunId();
        showToast('行程规划完成');
        if (event.data && event.data.redirect_url) {
            location.href = event.data.redirect_url;
        } else if (event.data && event.data.itinerary_id) {
            location.href = '/result/' + event.data.itinerary_id;
        }
    } else if (event.type === 'error') {
        clearActiveRunId();
        showToast(event.message || '规划失败', 'error');
        document.getElementById('formCard').style.display = 'block';
        document.getElementById('loadingSection').style.display = 'none';
    }
}

// 页面加载时：如果有未完成的 active run_id，尝试重连
window.addEventListener('DOMContentLoaded', () => {
    const activeRunId = getActiveRunId();
    if (activeRunId) {
        fetch('/api/v3/runs/' + activeRunId)
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    const run = data.data.run;
                    if (run.status === 'running' || run.status === 'pending' || run.status === 'retrying') {
                        document.getElementById('formCard').style.display = 'none';
                        document.getElementById('loadingSection').style.display = 'block';
                        document.getElementById('agentStatus').innerHTML = agentOrder.map(key =>
                            `<div id="agent-${key}" class="agent-status-item">${iconWait}${agentNames[key]} - 等待执行...</div>`
                        ).join('');
                        subscribeStream(activeRunId, JSON.parse(run.input_params || '{}'), null);
                    } else {
                        clearActiveRunId();
                    }
                } else {
                    clearActiveRunId();
                }
            })
            .catch(() => clearActiveRunId());
    }
});

function escapeHtml(text) {
    if (text == null) return '';
    return String(text).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
</script>
{% endblock %}
