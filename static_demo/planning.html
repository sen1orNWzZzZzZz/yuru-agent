<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent协作看板 - 灵动旅心 Python版</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="particles" id="particles"></div>

    <header class="header">
        <div class="header-inner">
            <a href="index.html" class="logo">
                <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20.24 12.24a6 6 0 0 0-8.49-8.49L5 10.5V19h8.5z"/>
                    <line x1="16" y1="8" x2="2" y2="22"/>
                    <line x1="17.5" y1="15" x2="9" y2="15"/>
                </svg>
                <span class="logo-text">灵动旅心</span>
            </a>
            <div class="header-right" style="display:flex;gap:12px;align-items:center;">
                <a href="admin.html" style="color:#667eea;font-size:0.85rem;text-decoration:none;padding:6px 14px;border:1px solid #667eea;border-radius:20px;">系统管理</a>
                <span class="header-badge">Agent协作看板</span>
                <div class="header-orb"></div>
            </div>
        </div>
    </header>

    <main class="main">
        <div class="planning-container">
            <!-- 顶部摘要 -->
            <div class="planning-header" id="planningHeader">
                <div class="planning-info">
                    <h1 class="planning-title">Agent协作看板</h1>
                    <p class="planning-meta" id="planningMeta">正在加载Agent协作结果...</p>
                </div>
                <div class="planning-stats">
                    <div class="stat-badge" id="timingBadge" style="display:none;">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#6BAF92" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
                        </svg>
                        <span id="timingText">--ms</span>
                    </div>
                </div>
            </div>

            <!-- 用户提示摘要 -->
            <div class="prompt-summary" id="promptSummary" style="display:none;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#D98A5B" stroke-width="2">
                    <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
                </svg>
                <span id="promptText">--</span>
            </div>

            <!-- Agent卡片网格 -->
            <div class="agent-grid" id="agentGrid">
                <div class="agent-card" style="grid-column: 1 / -1; text-align:center; padding: 40px;">
                    <div class="shimmer" style="width: 200px; height: 20px; margin: 0 auto 16px;"></div>
                    <div class="shimmer" style="width: 150px; height: 14px; margin: 0 auto;"></div>
                </div>
            </div>

            <!-- 底部操作 -->
            <div class="planning-footer" id="planningFooter" style="display: none;">
                <a href="itinerary.html" class="btn-primary btn-large">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
                    </svg>
                    查看完整行程
                </a>
            </div>
        </div>
    </main>

    <script src="js/main.js"></script>
    <script>
    // Agent配置
    const AGENT_CONFIG = {
        coordinator: {
            name: '中央调度器',
            icon: '<circle cx="12" cy="12" r="3"/><path d="M12 2v4m0 12v4m-8-8h4m12 0h4m-3.5-7.5L15 9m-6 6-3.5 3.5M18.5 16.5 15 15m-6-6L5.5 5.5"/>',
            color: '#D98A5B'
        },
        hotel: {
            name: '酒店推荐Agent',
            icon: '<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>',
            color: '#6BAF92'
        },
        restaurant: {
            name: '餐饮推荐Agent',
            icon: '<path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/>',
            color: '#D98A5B'
        },
        attraction: {
            name: '景点推荐Agent',
            icon: '<path d="m8 3 4 8 5-5 5 15H2L8 3z"/>',
            color: '#64B5F6'
        },
        transport: {
            name: '交通规划Agent',
            icon: '<rect x="4" y="3" width="16" height="16" rx="2"/><path d="M4 11h16"/><path d="M12 3v8"/>',
            color: '#5C6BC0'
        },
        risk: {
            name: '风控专家Agent',
            icon: '<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>',
            color: '#D96C6C'
        },
    };

    // 页面加载时从JSON加载数据并渲染
    window.addEventListener('DOMContentLoaded', async () => {
        const prompt = localStorage.getItem('planPrompt') || '带爸妈去杭州，看西湖和灵隐寺，不要太累，预算人均3000';

        try {
            const response = await fetch('api_result.json');
            const result = await response.json();

            // 更新头部信息
            const coord = result.coordinator || {};
            document.getElementById('planningMeta').textContent =
                `${coord.destination || '杭州'} · ${coord.travelers || 3}人 · 耗时${result.timing?.total_duration || 0}ms`;
            document.getElementById('timingText').textContent = `${result.timing?.total_duration || 0}ms`;
            document.getElementById('timingBadge').style.display = 'flex';
            document.getElementById('promptText').textContent = prompt;
            document.getElementById('promptSummary').style.display = 'flex';

            // 渲染Agent卡片
            renderAgentCards(result.agents || {});

            // 显示底部按钮
            document.getElementById('planningFooter').style.display = 'flex';
        } catch (e) {
            document.getElementById('agentGrid').innerHTML =
                '<div style="text-align:center;padding:40px;color:#6B7780;">加载失败，请返回首页重试</div>';
        }
    });

    function renderAgentCards(agents) {
        const grid = document.getElementById('agentGrid');
        const order = ['coordinator', 'hotel', 'restaurant', 'attraction', 'transport', 'risk'];

        grid.innerHTML = order.map((key, idx) => {
            const agent = agents[key];
            if (!agent) return '';
            const config = AGENT_CONFIG[key];
            const status = getAgentStatus(key, agent);
            const content = renderAgentContent(key, agent);

            return `
            <div class="agent-card ${status.borderClass}" style="animation: card-enter 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) both ${idx * 0.15}s">
                <div class="agent-header">
                    <div class="agent-icon" style="background: linear-gradient(135deg, ${config.color}20, ${config.color}08); color: ${config.color}">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${config.icon}</svg>
                    </div>
                    <div class="agent-info">
                        <h3 class="agent-name">${config.name}</h3>
                        <div class="agent-status">
                            <span class="status-dot" style="background: ${status.color}"></span>
                            <span class="status-text">${status.label}</span>
                        </div>
                    </div>
                </div>
                <div class="agent-content">${content}</div>
            </div>`;
        }).join('');
    }

    function getAgentStatus(key, agent) {
        if (key === 'risk' && agent.warnings && agent.warnings.length > 0) {
            return { color: '#D96C6C', label: `发现${agent.warnings.length}个异常`, borderClass: 'agent-warning' };
        }
        return { color: '#6BAF92', label: '已完成', borderClass: 'agent-completed' };
    }

    function renderAgentContent(key, agent) {
        if (!agent) return '<div class="shimmer"></div>';
        switch (key) {
            case 'coordinator': return renderCoordinator(agent);
            case 'hotel': return renderHotel(agent);
            case 'restaurant': return renderRestaurant(agent);
            case 'attraction': return renderAttraction(agent);
            case 'transport': return renderTransport(agent);
            case 'risk': return renderRisk(agent);
            default: return '<p>' + (agent.reasoning || '') + '</p>';
        }
    }

    function renderCoordinator(coord) {
        const keywords = coord.keywords || [];
        const styleMap = {slow: '慢节奏', intensive: '特种兵', family: '家庭', foodie: '美食', photography: '摄影'};
        return `
            <p class="agent-reasoning">已解析您的需求，提取以下关键信息：</p>
            <div class="keyword-tags">
                ${keywords.slice(0, 8).map(k => `<span class="keyword-tag">${k}</span>`).join('')}
            </div>
            <div class="coord-grid">
                <div class="coord-item"><span class="coord-label">目的地</span><span class="coord-value">${coord.destination || '-'}</span></div>
                <div class="coord-item"><span class="coord-label">出行人数</span><span class="coord-value">${coord.travelers || 2}人</span></div>
                <div class="coord-item"><span class="coord-label">旅行风格</span><span class="coord-value">${styleMap[coord.travel_style] || coord.travel_style || '-'}</span></div>
                ${coord.budget ? `<div class="coord-item"><span class="coord-label">预算</span><span class="coord-value" style="color: #D98A5B;">¥${coord.budget}/人</span></div>` : ''}
            </div>`;
    }

    function renderHotel(agent) {
        const hotels = agent.recommendations || [];
        return `
            <p class="agent-reasoning">${agent.reasoning || ''}</p>
            <div class="item-list">
                ${hotels.slice(0, 3).map(h => `
                    <div class="item-row">
                        <div class="item-icon" style="background: linear-gradient(135deg, #E8D5C4, #D4B896);">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                        </div>
                        <div class="item-info">
                            <span class="item-name">${h.name}</span>
                            <span class="item-meta">${h.district || ''} · ${h.rating}分 · ${h.ota_source || 'ota'}</span>
                        </div>
                        <div class="item-price">¥${h.price_per_night}<small>/晚</small></div>
                        ${h.xiaohongshu_credibility_score !== undefined ? renderCredBadge(h.xiaohongshu_credibility_score) : ''}
                    </div>
                `).join('')}
            </div>
            <p style="font-size: 11px; color: #B5ADA3; margin-top: 8px;">共找到 ${agent.total_found || 0} 家酒店</p>`;
    }

    function renderRestaurant(agent) {
        const items = agent.recommendations || [];
        return `
            <p class="agent-reasoning">${agent.reasoning || ''}</p>
            <div class="item-list">
                ${items.slice(0, 3).map(r => `
                    <div class="item-row">
                        <div class="item-icon" style="background: linear-gradient(135deg, #C8E6C9, #81C784);">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/></svg>
                        </div>
                        <div class="item-info">
                            <span class="item-name">${r.name}</span>
                            <span class="item-meta">${r.cuisine} · 人均¥${r.price_per_person}${r.distance ? ' · ' + r.distance.toFixed(1) + 'km' : ''}</span>
                        </div>
                        <span class="item-rating">${r.rating}分</span>
                    </div>
                `).join('')}
            </div>
            ${items.some(r => (r.xiaohongshu_credibility_score || 100) < 50) ?
                `<p style="font-size: 11px; color: #D96C6C; margin-top: 8px;">&#9888; ${items.filter(r => (r.xiaohongshu_credibility_score || 100) < 50).length} 家餐厅口碑存在水军嫌疑，已自动降权</p>` : ''}`;
    }

    function renderAttraction(agent) {
        const items = agent.recommendations || [];
        const risks = agent.altitude_risk || [];
        return `
            <p class="agent-reasoning">${agent.reasoning || ''}</p>
            ${risks.length > 0 ? `
            <div class="risk-alert">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#F57F17" stroke-width="2"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                <span>高反风险：${risks[0].advice}</span>
            </div>` : ''}
            <div class="item-list">
                ${items.slice(0, 3).map(a => `
                    <div class="item-row">
                        <div class="item-icon" style="background: linear-gradient(135deg, #BBDEFB, #64B5F6);">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="m8 3 4 8 5-5 5 15H2L8 3z"/></svg>
                        </div>
                        <div class="item-info">
                            <span class="item-name">${a.name}</span>
                            <span class="item-meta">${a.category} · ${a.visit_duration}分钟${a.is_free ? ' · 免费' : ' · ¥' + a.ticket_price}${a.altitude ? ' · 海拔' + a.altitude + 'm' : ''}</span>
                        </div>
                        <span class="item-rating">${a.rating}分</span>
                    </div>
                `).join('')}
            </div>`;
    }

    function renderTransport(agent) {
        const items = agent.recommendations || [];
        return `
            <p class="agent-reasoning">${agent.reasoning || ''}</p>
            <div class="item-list">
                ${items.slice(0, 3).map(t => `
                    <div class="item-row">
                        <div class="item-icon" style="background: linear-gradient(135deg, ${t.type === 'flight' ? '#E1BEE7, #AB47BC' : t.type === 'train' ? '#C5CAE9, #5C6BC0' : '#B2DFDB, #4DB6AC'});">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><rect x="4" y="3" width="16" height="16" rx="2"/><path d="M4 11h16"/><path d="M12 3v8"/></svg>
                        </div>
                        <div class="item-info">
                            <span class="item-name">${t.transport_no} · ${t.seat_class || t.transport_no}</span>
                            <span class="item-meta">${t.origin} → ${t.destination} · ${Math.floor(t.duration / 60)}h${t.duration % 60}m</span>
                        </div>
                        <div class="item-price">¥${t.price}</div>
                    </div>
                `).join('')}
            </div>`;
    }

    function renderRisk(agent) {
        const warnings = agent.warnings || [];
        if (warnings.length === 0) {
            return `<div class="risk-safe"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#6BAF92" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg><span>${agent.summary || '暂未发现明显风险'}</span></div>`;
        }
        return `
            <p class="agent-reasoning">${agent.summary || ''}</p>
            ${warnings.map(w => `
                <div class="risk-item risk-${w.level}">
                    <div class="risk-header">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                        <span class="risk-title">${w.message}</span>
                    </div>
                    <p class="risk-suggestion">建议：${w.suggestion}</p>
                    ${w.related_item ? `<p style="font-size: 10px; color: #B5ADA3; margin: 4px 0 0 20px;">涉及：${w.related_item}</p>` : ''}
                </div>
            `).join('')}`;
    }

    function renderCredBadge(score) {
        let cls = 'badge-medium';
        if (score >= 80) cls = 'badge-high';
        else if (score < 60) cls = 'badge-low';
        return `<span class="credibility-badge ${cls}">口碑${score}分</span>`;
    }
    </script>
    <style>
    @keyframes card-enter {
        from { opacity: 0; transform: translateY(20px) scale(0.95); }
        to { opacity: 1; transform: translateY(0) scale(1); }
    }
    </style>
</body>
</html>
